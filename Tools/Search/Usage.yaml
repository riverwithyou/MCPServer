tools:
  search:
    summary: 关键词搜索
    parameters:
      - name: keyword
        required: true
        description: 搜索关键词
      - name: engine
        required: false
        default: ""
        description: bing 或 duckduckgo，为空时使用配置中的默认引擎
      - name: page
        required: false
        default: 1
        description: 页码，从1开始
      - name: max_results
        required: false
        default: 20
        description: 最多返回结果数
    returns: 'JSON 字符串，包含 results 列表（每项含 title, link, snippet）、fallback（是否降级）等信息'
    example: 'search(keyword="天气", engine="bing", max_results=10)'

  batch_search:
    summary: 批量搜索多个关键词
    parameters:
      - name: keywords
        required: true
        description: 关键词列表，如 ["Python", "异步"]
      - name: engine
        required: false
        default: ""
        description: bing 或 duckduckgo，为空时使用配置中的默认引擎
      - name: page
        required: false
        default: 1
        description: 页码（所有关键词使用同一页码）
      - name: max_results
        required: false
        default: 20
        description: 每个关键词最多返回的结果数
    returns: 'JSON 字符串，包含 results 对象（key 为关键词，value 为该关键词搜索结果列表）及 fallback 信息'
    example: 'batch_search(keywords=["北京天气", "上海天气"], max_results=5)'

  fetch_url:
    summary: 深度爬取单个网址（支持 JavaScript 渲染）
    parameters:
      - name: url
        required: true
        description: 目标网址
      - name: max_length
        required: false
        default: 5000
        description: 返回文本的最大字符数
      - name: render_timeout
        required: false
        default: 2000
        description: 若指定 wait_for_selector，则为等待该选择器的超时时间（毫秒）；否则为页面加载后额外等待时间（毫秒）
      - name: wait_for_selector
        required: false
        default: null
        description: CSS 选择器，等待其出现后再提取内容
      - name: isolated
        required: false
        default: false
        description: 是否使用独立的浏览器上下文（隔离 Cookie/存储）
    returns: 'JSON 字符串，包含 url, text（提取的文本内容）, title, success 等字段'
    example: 'fetch_url(url="https://example.com", max_length=2000, isolated=False)'

  batch_fetch_urls:
    summary: 并发爬取多个网址
    parameters:
      - name: urls
        required: true
        description: 网址列表
      - name: max_length
        required: false
        default: 5000
        description: 每个网址返回文本的最大字符数
      - name: max_concurrent
        required: false
        default: 3
        description: 最大并发数，避免资源耗尽
      - name: render_timeout
        required: false
        default: 2000
        description: 若指定 wait_for_selector，则为等待该选择器的超时时间（毫秒）；否则为页面加载后额外等待时间（毫秒）
      - name: wait_for_selector
        required: false
        default: null
        description: CSS 选择器，等待其出现后再提取内容（应用于所有 URL）
      - name: isolated
        required: false
        default: false
        description: 是否使用独立的浏览器上下文（隔离 Cookie/存储）
    returns: 'JSON 字符串，包含 results 列表（每项含 url, text, title, success）及统计信息'
    example: 'batch_fetch_urls(urls=["https://bing.com", "https://duckduckgo.com"], max_concurrent=2)'